<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Welcome Back</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #8b0015;
            --primary-gradient: linear-gradient(90deg, #7a0010 0%, #a30018 100%);
            --text-dark: #111827;
            --text-muted: #4b5563;
            --input-bg: #f3f4f6;
            --focus-shadow: 0 4px 12px rgba(139, 0, 21, 0.08);
            --error-red: #df2222;
            --card-shadow: 0 8px 24px rgba(0, 0, 0, 0.04);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden; 
            background-color: #f8f9fa;
            position: relative;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bg-wave {
            position: absolute;
            left: 0;
            width: 100%;
            z-index: 0;
            pointer-events: none;
        }
        .bg-wave-top {
            top: 0;
            height: 12vh;
            min-height: 80px;
        }
        .bg-wave-bottom {
            bottom: 0;
            height: 10vh;
            min-height: 70px;
        }

        .back-btn {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            left: 20px;
            color: #ffffff;
            z-index: 15;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            transition: background 0.2s ease;
        }

        .back-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: calc(14vh + env(safe-area-inset-top)) 24px calc(12vh + env(safe-area-inset-bottom)) 24px;
            position: relative;
            z-index: 1;
        }

        .brand-section {
            width: 100%;
            text-align: center;
            margin-bottom: 1.5vh;
        }

        .logo-image {
            width: 140px;
            height: auto;
            object-fit: contain;
        }

        .header-content {
            text-align: center;
            margin-bottom: 3vh;
        }

        .header-content h1 {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
            letter-spacing: -0.03em;
        }

        .header-content p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 400;
        }

        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .input-group {
            position: relative;
            width: 100%;
        }

        .input-box {
            width: 100%;
            height: 54px;
            background-color: var(--input-bg);
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 0 45px 0 16px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-dark);
            outline: none;
            transition: all 0.2s ease;
        }

        .input-box:focus {
            border-color: var(--primary-burgundy);
            background-color: #ffffff;
            box-shadow: var(--focus-shadow);
        }

        .field-label {
            position: absolute;
            top: -9px;
            left: 14px;
            background-color: #f8f9fa; 
            padding: 0 6px;
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            z-index: 2;
        }

        .label-highlight {
            color: var(--primary-burgundy);
            font-weight: 700;
        }

        .phone-input-wrapper {
            display: flex;
            align-items: center;
        }

        .country-trigger {
            position: absolute;
            left: 14px;
            z-index: 3;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            height: 100%;
            padding-right: 8px;
            border-right: 1.5px solid #e5e7eb;
        }

        .trigger-flag {
            font-size: 18px;
            line-height: 1;
        }

        .trigger-code {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .trigger-arrow {
            font-size: 10px;
            color: var(--text-muted);
            margin-top: 1px;
        }

        .input-box.phone-indent {
            padding-left: 105px;
        }

        .country-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .country-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .country-modal {
            width: 90%;
            max-width: 360px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transform: scale(0.9);
            transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-height: 70vh;
        }

        .country-modal-overlay.active .country-modal {
            transform: scale(0.95);
        }

        .modal-search-wrapper {
            padding: 14px;
            border-bottom: 1px solid #f3f4f6;
            background: #ffffff;
        }

        .modal-search {
            width: 100%;
            height: 40px;
            background: #f3f4f6;
            border: 1.5px solid transparent;
            border-radius: 10px;
            padding: 0 12px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
        }

        .modal-search:focus {
            border-color: var(--primary-burgundy);
            background: #ffffff;
        }

        .country-list-scroll {
            overflow-y: auto;
            flex: 1;
            padding: 6px 0;
        }

        .country-item {
            display: flex;
            align-items: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: background 0.15s ease;
            gap: 12px;
        }

        .country-item:active, .country-item:hover {
            background: #f9fafb;
        }

        .item-flag {
            font-size: 20px;
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-dark);
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-code {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-muted);
        }

        .input-icon-right {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            width: 20px;
            height: 20px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .form-action-area {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            padding-bottom: 28px; 
        }

        .btn-submit {
            width: 100%;
            height: 56px;
            background: var(--primary-gradient);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(139, 0, 21, 0.15);
            transition: transform 0.1s ease, opacity 0.2s ease;
            letter-spacing: -0.01em;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .btn-submit:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Biometric Login Trigger Button */
        .btn-biometric {
            width: 100%;
            height: 54px;
            background: transparent;
            color: var(--primary-burgundy);
            font-size: 14px;
            font-weight: 700;
            border: 2px solid var(--primary-burgundy);
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: background 0.2s ease;
        }

        .btn-biometric:active {
            background: rgba(139, 0, 21, 0.05);
        }

        /* Biometric Iframe Modal Container */
        .biometric-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            z-index: 3000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .biometric-modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .biometric-modal-card {
            width: 90%;
            max-width: 380px;
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            display: flex;
            flex-direction: column;
            transform: translateY(20px);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .biometric-modal-overlay.active .biometric-modal-card {
            transform: translateY(0);
        }

        .biometric-modal-header {
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #f3f4f6;
        }

        .biometric-modal-title {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-dark);
        }

        .biometric-close-btn {
            border: none;
            background: none;
            font-size: 20px;
            color: var(--text-muted);
            cursor: pointer;
        }

        .biometric-iframe {
            width: 100%;
            height: 380px;
            border: none;
        }

        .reset-link {
            font-size: 13px;
            color: var(--text-dark);
            font-weight: 500;
            text-decoration: none;
        }

        .reset-link span {
            text-decoration: underline;
            color: var(--primary-burgundy);
            font-weight: 600;
        }

        .signup-redirect-footer {
            position: fixed;
            bottom: calc(4vh + env(safe-area-inset-bottom));
            left: 0;
            width: 100%;
            font-size: 12px;
            color: #ffffff;
            text-align: center;
            font-weight: 600;
            z-index: 10;
        }

        .signup-redirect-footer a {
            color: #ffffff;
            font-weight: 800;
            text-decoration: underline;
        }

        .toast-container {
            position: absolute;
            top: calc(20px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%);
            background: rgba(17, 24, 39, 0.96);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #ffffff;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            z-index: 3999; 
            display: none;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.15);
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 85%;
            max-width: 360px;
        }

        @media (max-height: 650px) {
            .app-view { padding-top: 100px; padding-bottom: 80px; }
            .logo-image { width: 110px; }
            .header-content h1 { font-size: 22px; }
            .btn-submit, .btn-biometric { height: 48px; }
        }
    </style>
</head>
<body>

    <div class="country-modal-overlay" id="countryModalOverlay">
        <div class="country-modal">
            <div class="modal-search-wrapper">
                <input type="text" id="modalSearchInput" class="modal-search" placeholder="Search country or code...">
            </div>
            <div class="country-list-scroll" id="countryListScroll"></div>
        </div>
    </div>

    <div class="biometric-modal-overlay" id="biometricModalOverlay">
        <div class="biometric-modal-card">
            <div class="biometric-modal-header">
                <span class="biometric-modal-title">Biometric Authentication</span>
                <button class="biometric-close-btn" id="closeBiometricBtn">✕</button>
            </div>
            <!-- Removed dynamic src load to prevent early auto-triggering -->
            <iframe class="biometric-iframe" id="biometricIframe" src=""></iframe>
        </div>
    </div>

    <svg class="bg-wave bg-wave-top" viewBox="0 0 375 200" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M0 0H375V80C375 80 280 200 0 120V0Z" fill="url(#paint0_linear)"/>
        <defs>
            <linearGradient id="paint0_linear" x1="187.5" y1="0" x2="187.5" y2="200" gradientUnits="userSpaceOnUse">
                <stop stop-color="#9A0019"/>
                <stop offset="1" stop-color="#700010"/>
            </linearGradient>
        </defs>
    </svg>

    <svg class="bg-wave bg-wave-bottom" viewBox="0 0 375 150" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M375 150H0V60C0 60 120 -20 375 40V150Z" fill="#9A0019"/>
    </svg>

    <div class="toast-container" id="toast-message">Error notification message</div>

    <a href="index.html" class="back-btn" aria-label="Go Back">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
    </a>

    <div class="app-view">
        
        <div class="brand-section">
            <img class="logo-image" src="birrgo-logo.png" alt="BirrGo Logo">
        </div>

        <div class="header-content">
            <h1>Welcome Back!</h1>
            <p>Log in to your account</p>
        </div>

        <form class="login-form" id="loginForm">
            
            <div class="input-group phone-input-wrapper">
                <span class="field-label">Phone Number <span class="label-highlight">*</span></span>
                
                <div class="country-trigger" id="countryTriggerBtn">
                    <span class="trigger-flag" id="currentFlag">🇪🇹</span>
                    <span class="trigger-code" id="currentCode">+251</span>
                    <span class="trigger-arrow">▼</span>
                </div>

                <input type="tel" id="loginPhone" class="input-box phone-indent" autofocus placeholder="9xxxxxxxx" maxlength="9" required>
                <div class="input-icon-right">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
                    </svg>
                </div>
            </div>

            <div class="input-group">
                <span class="field-label">PIN (6-digits) <span class="label-highlight">*</span></span>
                <input type="password" id="loginPin" maxlength="6" pattern="[0-9]{6}" inputmode="numeric" class="input-box" placeholder="••••••" required>
                <div class="input-icon-right">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                </div>
            </div>

            <div class="form-action-area">
                <button type="submit" id="submitBtn" class="btn-submit">Log In</button>
                
                <button type="button" id="biometricBtn" class="btn-biometric">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a10 10 0 0 0-10 10c0 5.523 4.477 10 10 10s10-4.477 10-10A10 10 0 0 0 12 2z"></path>
                        <path d="M12 6a6 6 0 0 0-6 6c0 3.314 2.686 6 6 6s6-2.686 6-6a6 6 0 0 0-6-6z"></path>
                        <path d="M12 10a2 2 0 0 0-2 2c0 1.103.897 2 2 2s2-.897 2-2a2 2 0 0 0-2-2z"></path>
                    </svg>
                    Use Fingerprint
                </button>
                
                <a href="#" class="reset-link">Forgot Pin? <span>Reset</span></a>
            </div>

        </form>

        <div class="signup-redirect-footer">
            New to BirrGo? <a href="register.html">Create Account</a>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const countries = [
            { name: "Ethiopia", code: "+251", flag: "🇪🇹" },
            { name: "Kenya", code: "+254", flag: "🇰🇪" },
            { name: "United States", code: "+1", flag: "🇺🇸" },
            { name: "United Kingdom", code: "+44", flag: "🇬🇧" },
            { name: "United Arab Emirates", code: "+971", flag: "🇦🇪" },
            { name: "Sudan", code: "+249", flag: "🇸🇩" },
            { name: "Somalia", code: "+252", flag: "🇸🇴" },
            { name: "Djibouti", code: "+253", flag: "🇩🇯" },
            { name: "Uganda", code: "+256", flag: "🇺🇬" },
            { name: "Tanzania", code: "+255", flag: "🇹🇿" },
            { name: "Nigeria", code: "+234", flag: "🇳🇬" },
            { name: "Ghana", code: "+233", flag: "🇬🇭" },
            { name: "South Africa", code: "+27", flag: "🇿🇦" },
            { name: "Saudi Arabia", code: "+966", flag: "🇸🇦" },
            { name: "Canada", code: "+1", flag: "🇨🇦" },
            { name: "Germany", code: "+49", flag: "🇩🇪" },
            { name: "France", code: "+33", flag: "🇫🇷" },
            { name: "India", code: "+91", flag: "🇮🇳" },
            { name: "China", code: "+86", flag: "🇨🇳" },
            { name: "Australia", code: "+61", flag: "🇦🇺" }
        ];

        let activeSelectedPrefix = "+251";
        let isSubmitting = false; 

        const overlay = document.getElementById('countryModalOverlay');
        const listScrollContainer = document.getElementById('countryListScroll');
        const searchInput = document.getElementById('modalSearchInput');
        const phoneInput = document.getElementById('loginPhone');

        const biometricOverlay = document.getElementById('biometricModalOverlay');
        const openBiometricBtn = document.getElementById('biometricBtn');
        const closeBiometricBtn = document.getElementById('closeBiometricBtn');
        const biometricIframe = document.getElementById('biometricIframe');

        function populateCountries(filterText = "") {
            listScrollContainer.innerHTML = "";
            const cleanFilter = filterText.toLowerCase().trim();
            
            const filtered = countries.filter(c => 
                c.name.toLowerCase().includes(cleanFilter) || 
                c.code.includes(cleanFilter)
            );

            filtered.forEach(country => {
                const row = document.createElement('div');
                row.className = 'country-item';
                row.innerHTML = `
                    <span class="item-flag">${country.flag}</span>
                    <span class="item-name">${country.name}</span>
                    <span class="item-code">${country.code}</span>
                `;
                row.addEventListener('click', () => {
                    document.getElementById('currentFlag').innerText = country.flag;
                    document.getElementById('currentCode').innerText = country.code;
                    activeSelectedPrefix = country.code;
                    
                    if (activeSelectedPrefix === "+251") {
                        phoneInput.placeholder = "9xxxxxxxx";
                        phoneInput.maxLength = 9;
                    } else {
                        phoneInput.placeholder = "Phone number";
                        phoneInput.removeAttribute('maxLength');
                    }
                    
                    closeCountryModal();
                });
                listScrollContainer.appendChild(row);
            });
        }

        function openCountryModal() {
            populateCountries();
            searchInput.value = "";
            overlay.classList.add('active');
        }

        function closeCountryModal() {
            overlay.classList.remove('active');
        }

        document.getElementById('countryTriggerBtn').addEventListener('click', openCountryModal);
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) closeCountryModal();
        });
        searchInput.addEventListener('input', (e) => {
            populateCountries(e.target.value);
        });

        phoneInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^0-9]/g, '');
        });

        function showNotification(message) {
            const toast = document.getElementById('toast-message');
            toast.innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 3500);
        }
        
        // Dynamic source initialization when user clicks the fingerprint button
        openBiometricBtn.addEventListener('click', () => {
            const savedPhone = localStorage.getItem('auth_session_phone');
            if (!savedPhone) {
                showNotification("Please log in with your PIN once before using fingerprint.");
                return;
            }
            biometricIframe.src = "finger.html"; // Loads the file ONLY on click
            biometricOverlay.classList.add('active');
        });

        function closeBiometricModal() {
            biometricOverlay.classList.remove('active');
            biometricIframe.src = ""; // Clears iframe location on exit to avoid hidden loops
        }

        closeBiometricBtn.addEventListener('click', closeBiometricModal);
        biometricOverlay.addEventListener('click', (e) => {
            if (e.target === biometricOverlay) closeBiometricModal();
        });

        window.addEventListener('message', (event) => {
            if (event.origin !== window.location.origin) return;

            if (event.data.status === 'SUCCESS') {
                closeBiometricModal();
                showNotification("Biometric Authenticated! Redirecting...");
                
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } 
            
            if (event.data.status === 'FAILED') {
                showNotification(event.data.error || "Biometric login failed.");
            }
        });

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            if (isSubmitting) return;

            const submitBtn = document.getElementById('submitBtn');
            const rawPhone = phoneInput.value.trim();
            const pinAttempt = document.getElementById('loginPin').value;

            let cleanPhone = rawPhone.replace(/^0+/, '');

            if (activeSelectedPrefix === "+251") {
                if (!/^[79][0-9]{8}$/.test(cleanPhone)) {
                    showNotification("Ethiopian phone numbers must be exactly 9 digits starting with 7 or 9.");
                    return;
                }
            } else {
                if (cleanPhone.length < 6 || cleanPhone.length > 14) {
                    showNotification("Please enter a valid phone number length.");
                    return;
                }
            }

            if (pinAttempt.length !== 6 || !/^\d+$/.test(pinAttempt)) {
                showNotification("PIN must be a valid 6-digit entry.");
                return;
            }

            try {
                isSubmitting = true;
                submitBtn.disabled = true;
                submitBtn.innerText = "Logging In...";

                const userSnapshot = await get(ref(db, 'users/' + cleanPhone));

                if (!userSnapshot.exists()) {
                    showNotification("Account not found. Please register first.");
                    isSubmitting = false;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Log In";
                    return;
                }

                const userData = userSnapshot.val();

                if (userData.securityPin === pinAttempt) {
                    localStorage.setItem('auth_session_phone', cleanPhone);
                    submitBtn.innerText = "Redirecting Securely...";
                    setTimeout(() => {
                        window.location.href = "dashboard.html";
                    }, 1000);
                } else {
                    showNotification("Incorrect security PIN profile entry.");
                    isSubmitting = false;
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Log In";
                }

            } catch (error) {
                console.error("Authentication Network Latency: ", error);
                showNotification("Connection lost. Please try again.");
                isSubmitting = false;
                submitBtn.disabled = false;
                submitBtn.innerText = "Log In";
            }
        });
    </script>
</body>
</html>
