<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Premium Wallet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="wallet.css">
</head>
<body>

    <div class="app-view">
        
        <svg class="bg-wave bg-wave-top" viewBox="0 0 375 200" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 0H375V80C375 80 280 200 0 120V0Z" fill="url(#paint0_linear)"/>
            <defs>
                <linearGradient id="paint0_linear" x1="187.5" y1="0" x2="187.5" y2="200" gradientUnits="userSpaceOnUse">
                    <stop stop-color="#9A0019"/>
                    <stop offset="1" stop-color="#700010"/>
                </linearGradient>
            </defs>
        </svg>

        <svg class="bg-wave bg-wave-bottom" viewBox="0 0 375 150" preserveAspectRatio="none" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M375 150H0V60C0 60 120 -20 375 40V150Z" fill="#9A0019"/>
        </svg>
        
        <div class="app-content">
            
            <div class="brand-header">
                <img class="logo-image" src="birrgo-logo.png" alt="BirrGo Logo">
                
                <button class="profile-btn" id="headerProfileBtn" aria-label="Profile">
                    <svg viewBox="0 0 24 24" style="width: 22px; height: 22px; fill: #4b5563; stroke: none;">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5-4-8-4z"></path>
                    </svg>
                </button>
            </div>

            <div class="badge-container">
                <button class="badge-button" id="whatsNewBadgeBtn">
                    <span class="badge-dot"></span>
                    <span class="badge-text">Today Giveaway</span>
                </button>
            </div>

            <div class="digital-card">
                <div class="card-top">
                    <div class="card-chip"></div>
                    <div class="card-identity-box">
                        <button class="btn-card-action" id="copyCardNumberBtn" title="Copy Card Number">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                        <button class="btn-card-action" id="eyeToggleBtn" title="Toggle Visibility">
                            <svg viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                
                <div class="card-number" id="wallet-card-number">•••• •••• •••• ••••</div>
                
                <div class="card-bottom">
                    <div>
                        <div class="card-holder-label">Card Holder</div>
                        <div class="card-holder-name" id="wallet-holder-name">•••• ••••••</div>
                    </div>
                    <div style="text-align: right;">
                        <div class="card-holder-label">Total Balance</div>
                        <div class="card-holder-name" id="wallet-total-balance" style="font-size: 16px; font-weight: 800;">0.00 Birr</div>
                    </div>
                </div>
            </div>

            <div class="wallet-actions">
                <button class="btn-wallet-action primary" id="depositBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"></line><polyline points="19 12 12 19 5 12"></polyline></svg>
                    Deposit
                </button>
                <button class="btn-wallet-action secondary" id="withdrawBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
                    Withdraw
                </button>
            </div>

            <h2 class="section-heading">Transaction History</h2>
            <div class="history-stack" id="transaction-history-container">
                <div class="history-loading-msg">
                    Streaming system history...
                </div>
            </div>

        </div>

        <nav class="bottom-nav-bar" id="bottomNavBar">
            <div id="navHome" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                Home
            </div>
            <div id="navTasks" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <polyline points="9 11 12 14 22 4"></polyline>
                    <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                </svg>
                Tasks
            </div>
            <div id="navLottery" class="nav-item">
                <svg viewBox="0 0 24 24">
                    <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
                </svg>
                Lottery
            </div>
            <div id="navWallet" class="nav-item active-tab">
                <div class="tab-icon-wrapper">
                    <svg viewBox="0 0 24 24">
                        <rect x="2" y="4" width="20" height="16" rx="2" ry="2"></rect>
                        <line x1="2" y1="10" x2="22" y2="10"></line>
                    </svg>
                </div>
                Wallet
            </div>
        </nav>

        <div class="custom-popup-backdrop" id="customPopup">
            <div class="custom-popup-card">
                <div class="popup-status-badge bg-success" id="popupBadge">
                    <svg viewBox="0 0 24 24" id="popupIcon">
                        <polyline points="20 6 9 17 4 12"></polyline>
                    </svg>
                </div>
                <h3 class="custom-popup-title" id="popupTitle">Notification</h3>
                <p class="custom-popup-msg" id="popupMessage">Message info goes here natively.</p>
                <button class="btn-popup-confirm" id="popupConfirmBtn">Done</button>
            </div>
        </div>

    </div>

    <div class="security-modal-backdrop" id="securityModal">
        <div class="security-modal-card" id="securityModalCard">
            <div class="security-modal-icon" id="modalIconBox">
                <svg viewBox="0 0 24 24" id="modalIconSvg"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h3 class="security-modal-title" id="modalTitle">Enter PIN</h3>
            <p class="security-modal-desc" id="modalDesc">Please input your 4-digit account security PIN to decrypt your secure ledger identity details.</p>
            
            <div class="modal-error-banner" id="modalErrorBanner"></div>

            <input type="password" maxlength="4" inputmode="numeric" class="security-password-input" id="securePassInput" placeholder="••••">
            <div class="security-modal-actions" id="modalActionsGroup">
                <button class="btn-modal-cancel" id="closeModalBtn">Cancel</button>
                <button class="btn-modal-submit" id="submitPassBtn">Verify</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let activeUserPhone = "";
        let decryptedCardNum = "";
        let decryptedFullName = "";
        let infoIsVisible = false;

        const customPopup = document.getElementById('customPopup');
        const popupBadge = document.getElementById('popupBadge');
        const popupIcon = document.getElementById('popupIcon');
        const popupTitle = document.getElementById('popupTitle');
        const popupMessage = document.getElementById('popupMessage');
        const popupConfirmBtn = document.getElementById('popupConfirmBtn');

        window.goToPage = function(page) {
            if (page === '#') return;
            window.location.replace(page);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            activeUserPhone = localStorage.getItem('auth_session_phone');
            if (!activeUserPhone) {
                window.location.href = "new2.html";
                return;
            }

            calculateCardIdentityMatrix();
            startLiveWalletListeners();
            setupSecurityToggles();
            setupFeatureGateways();
            setupNavigationHandlers();
            setupNotificationBadgeHandler();
        });

        function displayAppModal(type, title, message, onConfirm = null) {
            popupBadge.className = "popup-status-badge";
            popupTitle.innerText = title;
            popupMessage.innerText = message;

            if (type === 'success') {
                popupBadge.classList.add('bg-success');
                popupIcon.innerHTML = `<polyline points="20 6 9 17 4 12"></polyline>`;
            } else if (type === 'lock') {
                popupBadge.classList.add('bg-lock');
                popupIcon.innerHTML = `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>`;
            } else {
                popupBadge.classList.add('bg-error');
                popupIcon.innerHTML = `<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>`;
            }

            customPopup.style.display = 'flex';
            setTimeout(() => customPopup.classList.add('show-modal'), 10);

            const handleClosure = () => {
                customPopup.classList.remove('show-modal');
                setTimeout(() => {
                    customPopup.style.display = 'none';
                    if (onConfirm) onConfirm();
                }, 300);
                popupConfirmBtn.removeEventListener('click', handleClosure);
            };
            popupConfirmBtn.addEventListener('click', handleClosure);
        }

        function setupNavigationHandlers() {
            document.getElementById('navHome').addEventListener('click', () => goToPage('dashboard.html'));
            document.getElementById('navTasks').addEventListener('click', () => goToPage('task.html'));
            document.getElementById('navLottery').addEventListener('click', () => goToPage('lottery.html'));
            document.getElementById('headerProfileBtn').addEventListener('click', () => goToPage('profile.html'));
        }

        function setupNotificationBadgeHandler() {
            const badgeBtn = document.getElementById('whatsNewBadgeBtn');
            badgeBtn.addEventListener('click', () => {
                goToPage('give.html');
            });
        }

        function calculateCardIdentityMatrix() {
            const cleanPhone = activeUserPhone.replace(/\D/g, '');
            const final6Reversed = cleanPhone.slice(-6).split('').reverse().join('');
            const completeRawCardSequence = cleanPhone + final6Reversed;
            decryptedCardNum = completeRawCardSequence.match(/.{1,4}/g).join(' ');
            
            const userRef = ref(db, `users/${activeUserPhone}`);
            get(userRef).then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    decryptedFullName = userData.fullName || "Elite Member";
                } else {
                    decryptedFullName = "Elite Member";
                }
            }).catch(() => {
                decryptedFullName = "Elite Member";
            });

            document.getElementById('copyCardNumberBtn').addEventListener('click', (e) => {
                e.stopPropagation();
                if (!decryptedCardNum) return;
                
                navigator.clipboard.writeText(decryptedCardNum.replace(/\s/g, ''))
                    .then(() => {
                        displayAppModal('success', 'Copied Successfully', 'Card number copied to your local clipboard framework storage.');
                    })
                    .catch(() => {
                        const fallbackInput = document.createElement('input');
                        fallbackInput.value = decryptedCardNum.replace(/\s/g, '');
                        document.body.appendChild(fallbackInput);
                        fallbackInput.select();
                        document.execCommand('copy');
                        document.body.removeChild(fallbackInput);
                        displayAppModal('success', 'Copied Successfully', 'Card number copied to your local clipboard framework storage.');
                    });
            });
        }

        function setupSecurityToggles() {
            const modal = document.getElementById('securityModal');
            const modalCard = document.getElementById('securityModalCard');
            const errorBanner = document.getElementById('modalErrorBanner');
            const passInput = document.getElementById('securePassInput');
            const iconBox = document.getElementById('modalIconBox');
            const iconSvg = document.getElementById('modalIconSvg');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const actionsGroup = document.getElementById('modalActionsGroup');
            
            function clearErrorState() {
                modalCard.classList.remove('has-error');
                errorBanner.style.display = "none";
                errorBanner.innerText = "";
            }

            document.getElementById('eyeToggleBtn').addEventListener('click', () => {
                if (infoIsVisible) {
                    document.getElementById('wallet-card-number').innerText = "•••• •••• •••• ••••";
                    document.getElementById('wallet-holder-name').innerText = "•••• ••••••";
                    document.getElementById('eyeToggleBtn').innerHTML = `<svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
                    infoIsVisible = false;
                } else {
                    clearErrorState();
                    iconBox.className = "security-modal-icon";
                    iconSvg.innerHTML = `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>`;
                    title.innerText = "Enter PIN";
                    desc.innerText = "Please input your 4-digit account security PIN to decrypt your secure ledger identity details.";
                    passInput.style.display = "block";
                    passInput.value = "";
                    actionsGroup.className = "security-modal-actions";
                    actionsGroup.innerHTML = `
                        <button class="btn-modal-cancel" id="closeModalBtn">Cancel</button>
                        <button class="btn-modal-submit" id="submitPassBtn">Verify</button>
                    `;
                    
                    document.getElementById('closeModalBtn').addEventListener('click', closeModalTerminal);
                    document.getElementById('submitPassBtn').addEventListener('click', handlePinVerification);

                    modal.style.display = "flex";
                    setTimeout(() => modal.classList.add('show-modal'), 10);
                }
            });

            function closeModalTerminal() {
                modal.classList.remove('show-modal');
                setTimeout(() => modal.style.display = "none", 200);
            }

            passInput.addEventListener('input', () => {
                if(modalCard.classList.contains('has-error')) clearErrorState();
            });

            async function handlePinVerification() {
                const typedPin = passInput.value.trim();
                if(!typedPin) return;

                const pinRef = ref(db, `users/${activeUserPhone}/securityPin`);
                try {
                    const snap = await get(pinRef);
                    if(snap.exists() && String(snap.val()) === typedPin) {
                        document.getElementById('wallet-card-number').innerText = decryptedCardNum;
                        document.getElementById('wallet-holder-name').innerText = decryptedFullName;
                        document.getElementById('eyeToggleBtn').innerHTML = `<svg viewBox="0 0 24 24"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>`;
                        infoIsVisible = true;
                        closeModalTerminal();
                    } else {
                        modalCard.classList.add('has-error');
                        errorBanner.innerText = "Invalid security PIN sequence. Try again.";
                        errorBanner.style.display = "block";
                        passInput.value = "";
                        errorBanner.style.animation = 'none';
                        errorBanner.offsetHeight; 
                        errorBanner.style.animation = null;
                    }
                } catch(e) {
                    modalCard.classList.add('has-error');
                    errorBanner.innerText = "Verification connection interrupted.";
                    errorBanner.style.display = "block";
                }
            }
        }

        function setupFeatureGateways() {
            const modal = document.getElementById('securityModal');
            const iconBox = document.getElementById('modalIconBox');
            const iconSvg = document.getElementById('modalIconSvg');
            const title = document.getElementById('modalTitle');
            const desc = document.getElementById('modalDesc');
            const passInput = document.getElementById('securePassInput');
            const actionsGroup = document.getElementById('modalActionsGroup');
            const errorBanner = document.getElementById('modalErrorBanner');
            const modalCard = document.getElementById('securityModalCard');

            function launchLockedNotice() {
                modalCard.classList.remove('has-error');
                errorBanner.style.display = "none";
                
                iconBox.className = "security-modal-icon bg-lock";
                iconSvg.innerHTML = `<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path>`;
                
                title.innerText = "Withdraw System Locked";
                desc.innerText = "The native withdrawal gateway is coming soon! Complete video tasks daily to continue stacking up your database wallet balance.";

                passInput.style.display = "none";
                actionsGroup.className = "security-modal-actions single-btn";
                actionsGroup.innerHTML = `<button class="btn-modal-submit" id="dismissLockBtn">Understood</button>`;

                document.getElementById('dismissLockBtn').addEventListener('click', () => {
                    modal.classList.remove('show-modal');
                    setTimeout(() => modal.style.display = "none", 200);
                });

                modal.style.display = "flex";
                setTimeout(() => modal.classList.add('show-modal'), 10);
            }

            document.getElementById('depositBtn').addEventListener('click', () => {
                window.location.href = "deposit.html";
            });

            document.getElementById('withdrawBtn').addEventListener('click', () => launchLockedNotice());
        }

        function startLiveWalletListeners() {
            const balanceRef = ref(db, `users/${activeUserPhone}/walletBalance`);
            
            onValue(balanceRef, (snapshot) => {
                const balanceVal = snapshot.val();
                if (balanceVal === null) {
                    set(balanceRef, 0);
                    document.getElementById('wallet-total-balance').innerText = "0.00 Birr";
                    return;
                }
                const numericTotal = parseFloat(balanceVal);
                document.getElementById('wallet-total-balance').innerText = `${numericTotal.toFixed(2)} Birr`;
            });

            const historyContainer = document.getElementById('transaction-history-container');
            const userRef = ref(db, `users/${activeUserPhone}`);

            function convertToTimestamp(timeStr) {
                if (!timeStr || timeStr === 'Just now') return Date.now();
                
                if (!isNaN(timeStr)) return Number(timeStr);

                let cleanStr = timeStr.replace(/,/g, '').trim();
                
                if (/^\d{1,2}\/\d{1,2}\/\d{4}/.test(cleanStr)) {
                    const sections = cleanStr.split(' ');
                    const dateParts = sections[0].split('/');
                    const day = dateParts[0];
                    const month = dateParts[1];
                    const year = dateParts[2];
                    
                    cleanStr = `${year}-${month.padStart(2, '0')}-${day.padStart(2, '0')}`;
                    if (sections[1]) cleanStr += `T${sections[1]}`;
                }
                
                const finalParsedEpoch = Date.parse(cleanStr);
                return !isNaN(finalParsedEpoch) ? finalParsedEpoch : 0;
            }

            onValue(userRef, (snapshot) => {
                historyContainer.innerHTML = ''; 
                let masterTransactionList = [];

                if (snapshot.exists()) {
                    const userData = snapshot.val();

                    if (userData.transactions) {
                        Object.keys(userData.transactions).forEach(key => {
                            const tx = userData.transactions[key];
                            
                            // Normalize fields to safely run strict matches
                            const status = (tx.status || '').toLowerCase();
                            const title = (tx.title || '').toLowerCase();

                            // 🚀 TARGETED FILTER: Skip only pending, rejected, and cancelled transactions
                            if (
                                status === 'pending' || 
                                status === 'rejected' || 
                                status === 'canceled' || 
                                status === 'cancelled' ||
                                title.includes('pending') ||
                                title.includes('rejected') ||
                                title.includes('canceled') ||
                                title.includes('cancelled')
                            ) {
                                return; // Skip these completely
                            }

                            let calculatedFallbackSort = 0;
                            if (tx.sortingTime) {
                                calculatedFallbackSort = Number(tx.sortingTime);
                            } else {
                                calculatedFallbackSort = convertToTimestamp(tx.timestamp);
                            }

                            masterTransactionList.push({
                                title: tx.title || 'Wallet Activity',
                                timestamp: tx.timestamp || 'Just now',
                                amount: parseFloat(tx.amount) || 0,
                                type: tx.type || (tx.amount > 0 ? 'income' : 'expense'),
                                sortingValue: calculatedFallbackSort
                            });
                        });
                    }

                    if (userData.claimedPromos) {
                        Object.keys(userData.claimedPromos).forEach(codeKey => {
                            const promo = userData.claimedPromos[codeKey];
                            let dateLabel = 'Just now';
                            let finalSortVal = 0;
                            
                            if (promo.claimedAt) {
                                finalSortVal = Number(promo.claimedAt);
                                const d = new Date(finalSortVal);
                                dateLabel = d.toLocaleDateString([], {month:'short', day:'numeric'}) + ' ' + d.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                            } else {
                                finalSortVal = Date.now();
                            }

                            masterTransactionList.push({
                                title: `🎁 Promo Reward Claim [${codeKey}]`,
                                timestamp: dateLabel,
                                amount: parseFloat(promo.amountClaimed) || 0, 
                                type: 'income',
                                sortingValue: finalSortVal
                            });
                        });
                    }
                }

                if (masterTransactionList.length === 0) {
                    historyContainer.innerHTML = `
                        <div class="history-empty-msg">
                            No account activity tracked yet. Complete a task video or activate promo rewards to see them pop here!
                        </div>`;
                    return;
                }

                masterTransactionList.sort((a, b) => b.sortingValue - a.sortingValue);

                masterTransactionList.forEach(tx => {
                    const cardRow = document.createElement('div');
                    cardRow.className = 'history-card';

                    const isIncome = tx.type === 'income' || tx.amount > 0;
                    const visualSymbol = tx.title.includes('🎁') ? '🎁' : (isIncome ? '⚡' : '🎟️');
                    const stylingClass = isIncome ? 'income' : 'expense';
                    const prefixMathSign = isIncome ? '+' : '-';

                    cardRow.innerHTML = `
                        <div class="history-left">
                            <div class="history-icon-box">${visualSymbol}</div>
                            <div class="history-info">
                                <h4>${tx.title}</h4>
                                <p>${tx.timestamp}</p>
                            </div>
                        </div>
                        <div class="history-right">
                            <div class="history-amount ${stylingClass}">
                                ${prefixMathSign}${Math.abs(tx.amount).toFixed(2)} Br
                            </div>
                        </div>
                    `;
                    historyContainer.appendChild(cardRow);
                });
            });
        }
    </script>
</body>
</html>
