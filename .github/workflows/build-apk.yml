name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows GitHub Actions to create and edit Releases
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Cordova and Tools
        run: |
          npm install -g cordova
          sudo apt-get update
          sudo apt-get install -y gradle

      - name: Create Mobile Project wrapper
        run: |
          cordova create appcom com.birrgo.app "Birr Go"
          cd appcom
          rm -rf www/*
          cp -r ../* www/ || true
          rm -rf www/appcom
          cp ../config.xml ./config.xml
          cp ../icon.png ./icon.png || true
          cordova platform add android

      - name: Build Android APK File
        run: |
          cd appcom
          cordova build android

      # Renames the output file from app-debug.apk to birrgo.apk
      - name: Rename APK Output File
        run: |
          mv appcom/platforms/android/app/build/outputs/apk/debug/app-debug.apk appcom/platforms/android/app/build/outputs/apk/debug/birrgo.apk

      - name: Publish APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Birrgo App Build"
          body: "This release contains the auto-generated APK pointing to https://test.birrgo.online. Updated on ${{ github.event.head_commit.timestamp }}."
          draft: false
          prerelease: false
          files: appcom/platforms/android/app/build/outputs/apk/debug/birrgo.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
