<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Admin Control Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #800020;
            --primary-gradient: linear-gradient(135deg, #9b0026 0%, #4a0000 100%);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 20px 40px -15px rgba(128, 0, 32, 0.15);
            --error-red: #df2222;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
        }

        body {
            background-color: var(--bg-light);
            color: var(--text-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border: 1px solid var(--border-light);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--card-shadow);
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .login-header {
            text-align: center;
        }

        .login-header h1 {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-burgundy);
            margin-bottom: 6px;
        }

        .login-header p {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
        }

        .input-field-wrapper {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .input-field-wrapper label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .admin-input {
            width: 100%;
            height: 52px;
            background: #eef2f5;
            border: 1.5px solid transparent;
            border-radius: 14px;
            padding: 0 16px;
            font-size: 16px;
            font-weight: 600;
            outline: none;
            transition: all 0.2s ease;
            color: var(--text-dark);
        }

        .admin-input:focus {
            border-color: var(--primary-burgundy);
            background: #ffffff;
            box-shadow: 0 4px 12px rgba(128, 0, 32, 0.12);
        }

        .btn-login {
            width: 100%;
            height: 52px;
            background: var(--primary-gradient);
            border: none;
            border-radius: 26px;
            font-weight: 700;
            font-size: 16px;
            color: #ffffff;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(128, 0, 32, 0.2);
            transition: transform 0.1s ease, opacity 0.2s ease;
            margin-top: 8px;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .error-banner {
            background: #fef2f2;
            color: var(--error-red);
            border: 1px solid #fee2e2;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            text-align: center;
            display: none;
        }

        .user-link {
            text-align: center;
            font-size: 13px;
            font-weight: 600;
        }

        .user-link a {
            color: var(--text-muted);
            text-decoration: none;
        }
        
        .user-link a:hover {
            color: var(--primary-burgundy);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="login-header">
            <h1>BirrGo Command</h1>
            <p>Admin Control Core Authentication</p>
        </div>

        <div class="error-banner" id="errorBanner">Invalid Admin Credentials. Access Denied.</div>

        <form id="adminLoginForm" onsubmit="processAdminAuth(event)" style="display: flex; flex-direction: column; gap: 18px;">
            <div class="input-field-wrapper">
                <label>System Administrator ID</label>
                <input type="text" id="adminUser" class="admin-input" placeholder="Username..." autocomplete="off" required>
            </div>

            <div class="input-field-wrapper">
                <label>Security Override Password</label>
                <input type="password" id="adminPass" class="admin-input" placeholder="•••••" required>
            </div>

            <button type="submit" class="btn-login">Verify & Open Core</button>
        </form>

        <div class="user-link">
            <a href="new2.html">← Return to Regular User Login</a>
        </div>
    </div>

    <script>
        // Automatic bypass check if session token is active
        if (sessionStorage.getItem('birrgo_admin_session') === 'active') {
            window.location.href = "new.html"; 
        }

        function processAdminAuth(e) {
            e.preventDefault();
            
            const user = document.getElementById('adminUser').value.trim();
            const pass = document.getElementById('adminPass').value.trim();
            const errorBanner = document.getElementById('errorBanner');

            // Hardcoded Credentials Guard
            if (user === "ADMIN" && pass === "258852") {
                errorBanner.style.display = 'none';
                
                // Track active session status
                sessionStorage.setItem('birrgo_admin_session', 'active');

                // Route forward to admin panel dashboard page
                window.location.href = "new.html"; 
            } else {
                errorBanner.style.display = 'block';
                document.getElementById('adminPass').value = '';
            }
        }
    </script>
</body>
</html>
