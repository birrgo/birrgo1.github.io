<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Play Task</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="task.css">
    <style>
        /* Base Reset & Dynamic Screen Scaling */
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        
        /* Fully scalable viewport structure aligned with BirrGo Core layout rules */
        .immersive-overlay {
            display: flex;
            flex-direction: column;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 9999;
            background-color: #0c0c0e;
        }

        /* Brand Header styling integrated from BirrGo Main Dashboard UI */
        .brand-header-task {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px 20px;
            background: #16161a;
            border-bottom: 1px solid #24242e;
            position: relative;
            z-index: 10;
        }

        .brand-logo-task {
            height: 28px;
            object-fit: contain;
        }

        /* Dynamically splits viewport to load media and monetization units organically */
        .split-media-viewport {
            display: flex;
            flex-direction: column;
            flex: 1;
            width: 100%;
            height: 100%;
            background: #000;
        }

        .ad-container-frame, .youtube-player-box {
            flex: 1;
            width: 100%;
            height: 50%;
            position: relative;
        }

        .youtube-player-box iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
        
        /* Control Dashboard Panel replacing bottom-nav blocks entirely */
        .overlay-navbar {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px 20px;
            background-color: #16161a;
            border-top: 1px solid #24242e;
            gap: 12px;
        }

        /* Configured specifically to output countdown state in Red */
        .overlay-countdown-label {
            color: #9A0019;
            font-size: 1.25rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .btn-close-overlay {
            width: 100%;
            max-width: 340px;
            padding: 14px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 4px 12px rgba(34, 197, 94, 0.25);
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Adaptable Popup Modal Overlay matching BirrGo UX Specs */
        .custom-popup-backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            z-index: 100000;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .custom-popup-backdrop.show-modal {
            opacity: 1;
        }

        .custom-popup-card {
            background-color: #16161a;
            border: 1px solid #24242e;
            border-radius: 24px;
            padding: 28px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .popup-status-badge {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
        }

        .bg-success {
            background-color: rgba(34, 197, 94, 0.12);
            border: 2px solid #22c55e;
        }

        .bg-error {
            background-color: rgba(154, 0, 25, 0.12);
            border: 2px solid #9A0019;
        }

        .popup-status-badge svg {
            width: 28px;
            height: 28px;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .bg-success svg {
            stroke: #22c55e;
        }

        .bg-error svg {
            stroke: #9A0019;
        }

        .custom-popup-title {
            color: #fff;
            margin: 0 0 10px 0;
            font-size: 1.2rem;
            font-weight: 700;
        }

        .custom-popup-msg {
            color: #94a3b8;
            margin: 0 0 24px 0;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .popup-action-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .btn-popup-cancel {
            flex: 1;
            padding: 12px;
            background: #24242e;
            color: #fff;
            border: 1px solid #3b3b4f;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
        }

        .btn-popup-confirm {
            flex: 1;
            padding: 12px;
            background: #22c55e;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.95rem;
        }
        
        .reward-highlight {
            color: #22c55e;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="immersive-overlay" id="adViewerOverlay">
        <!-- Brand Header Bar without quit actions -->
        <div class="brand-header-task">
            <img src="birrgo-logo.png" alt="BirrGo Logo" class="brand-logo-task">
        </div>

        <!-- Split Media Content viewport framework -->
        <div class="split-media-viewport">
            <div id="adContainer" class="ad-container-frame"></div>
            <div id="youtubePlayerContainer" class="youtube-player-box"></div>
        </div>
        
        <!-- Action control cluster -->
        <div class="overlay-navbar">
            <div class="overlay-countdown-label" id="overlayCountdown">Loading Task...</div>
            <button class="btn-close-overlay" id="closeOverlayBtn" style="display: none;">Claim Reward</button>
        </div>
    </div>

    <!-- BirrGo Architecture Status / Choice Popup Modal wrapper -->
    <div class="custom-popup-backdrop" id="customPopup">
        <div class="custom-popup-card">
            <div class="popup-status-badge bg-success" id="popupBadge">
                <svg viewBox="0 0 24 24" id="popupIcon">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h3 class="custom-popup-title" id="popupTitle">Notification</h3>
            <p class="custom-popup-msg" id="popupMessage">Processing...</p>
            <div class="popup-action-row" id="popupActionRow">
                <button class="btn-popup-cancel" id="popupCancelBtn" style="display: none;">No, Stay</button>
                <button class="btn-popup-confirm" id="popupConfirmBtn">Done</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, get, runTransaction, push, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const watchDuration = 60; 
        let timeLeft = watchDuration;
        let taskCompleted = false;
        let activeUserPhone = "";
        let taskId = "";
        let currentCountdownInterval = null;
        let currentAdReloadInterval = null;

        const overlayCountdown = document.getElementById('overlayCountdown');
        const closeOverlayBtn = document.getElementById('closeOverlayBtn');
        const youtubePlayerContainer = document.getElementById('youtubePlayerContainer');
        const adContainer = document.getElementById('adContainer');

        const customPopup = document.getElementById('customPopup');
        const popupBadge = document.getElementById('popupBadge');
        const popupIcon = document.getElementById('popupIcon');
        const popupTitle = document.getElementById('popupTitle');
        const popupMessage = document.getElementById('popupMessage');
        const popupConfirmBtn = document.getElementById('popupConfirmBtn');
        const popupCancelBtn = document.getElementById('popupCancelBtn');

        // Page refresh or close browser trap handling
        window.onbeforeunload = function(e) {
            if (!taskCompleted) {
                e.preventDefault();
                return "Wait! If you leave this page, you won't get your money!";
            }
        };

        // System gesture back button interception trap
        window.history.pushState(null, "", window.location.href);
        window.onpopstate = function() {
            if (!taskCompleted) {
                window.history.pushState(null, "", window.location.href);
                triggerExitWarning();
            }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            activeUserPhone = localStorage.getItem('auth_session_phone');
            
            const urlParams = new URLSearchParams(window.location.search);
            taskId = urlParams.get('id');

            if (!activeUserPhone || !taskId) {
                window.location.replace("task.html");
                return;
            }

            startVideoTask(taskId);
        });

        // Trigger styled exit modal block if user uses alternative back logic
        function triggerExitWarning() {
            displayAppModal(
                'error', 
                'Are you sure you want to leave?', 
                "If you leave this page before the 1-minute timer runs out, you will NOT receive your money! Do you still want to leave?", 
                () => {
                    window.onbeforeunload = null;
                    window.location.replace("task.html");
                },
                () => {
                    customPopup.classList.remove('show-modal');
                    setTimeout(() => { customPopup.style.display = 'none'; }, 300);
                },
                true
            );
        }

        function displayAppModal(type, title, message, onConfirm = null, onCancel = null, isConfirmationPair = false) {
            popupBadge.className = "popup-status-badge";
            popupTitle.innerText = title;
            popupMessage.innerText = message;

            if (type === 'success') {
                popupBadge.classList.add('bg-success');
                popupIcon.innerHTML = `<polyline points="20 6 9 17 4 12"></polyline>`;
            } else {
                popupBadge.classList.add('bg-error');
                popupIcon.innerHTML = `<circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line>`;
            }

            if (isConfirmationPair) {
                popupCancelBtn.style.display = 'block';
                popupCancelBtn.innerText = "No, Stay";
                popupConfirmBtn.innerText = "Yes, Leave";
                popupConfirmBtn.style.background = "#9A0019";
            } else {
                popupCancelBtn.style.display = 'none';
                popupConfirmBtn.innerText = "Done";
                popupConfirmBtn.style.background = "#22c55e";
            }

            customPopup.style.display = 'flex';
            setTimeout(() => customPopup.classList.add('show-modal'), 10);

            popupConfirmBtn.onclick = () => {
                customPopup.classList.remove('show-modal');
                setTimeout(() => {
                    customPopup.style.display = 'none';
                    if (onConfirm) onConfirm();
                }, 300);
            };

            popupCancelBtn.onclick = () => {
                if (onCancel) onCancel();
            };
        }

        async function startVideoTask(id) {
            try {
                const snapshot = await get(ref(db, `task/task${id}`));
                const fetchedUrl = snapshot.exists() ? snapshot.val() : "";

                if (!fetchedUrl) {
                    displayAppModal('error', 'Error', 'Task video URL details are empty.', () => {
                        window.location.replace("task.html");
                    });
                    return;
                }

                injectUniversalMediaFrame(fetchedUrl);
                loadMonetagAd();

                timeLeft = watchDuration;
                overlayCountdown.innerText = "Remaining: 1:00";

                currentAdReloadInterval = setInterval(() => {
                    loadMonetagAd();
                }, 20000);

                currentCountdownInterval = setInterval(async () => {
                    timeLeft--;
                    const minutes = Math.floor(timeLeft / 60);
                    const seconds = timeLeft % 60;
                    
                    // Maintain standard countdown string formatting with Red text design rules
                    overlayCountdown.innerText = `Remaining: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

                    if (timeLeft <= 0) {
                        clearInterval(currentCountdownInterval);
                        clearInterval(currentAdReloadInterval);
                        taskCompleted = true;
                        
                        try {
                            await runTransaction(ref(db, `users/${activeUserPhone}/walletBalance`), (curr) => (parseFloat(curr) || 0) + 20);
                            
                            const newTxNode = push(ref(db, `users/${activeUserPhone}/transactions`));
                            await set(newTxNode, {
                                title: `Watch Task Video #${id}`,
                                amount: 20.00,
                                type: "income",
                                timestamp: new Date().toLocaleString()
                            });

                            localStorage.setItem(`video_cooldown_${id}`, Date.now());

                            // Success text color alteration to clear green once finished
                            overlayCountdown.style.color = "#22c55e";
                            overlayCountdown.innerText = "Finished! +20 Birr";
                            closeOverlayBtn.style.display = "block"; 

                            displayAppModal('success', 'Task Completed', 'Your 20 Birr has been credited directly to your wallet.', () => {
                                window.onbeforeunload = null;
                                window.location.replace("task.html");
                            });

                        } catch (error) {
                            displayAppModal('error', 'Sync Failed', 'Network database validation failed.');
                        }
                    }
                }, 1000);

            } catch (err) {
                console.error(err);
                window.location.replace("task.html");
            }
        }

        function loadMonetagAd() {
            adContainer.innerHTML = "";
            const adIframe = document.createElement('iframe');
            adIframe.style.width = "100%";
            adIframe.style.height = "100%";
            adIframe.style.border = "none";
            adIframe.style.overflow = "hidden";
            adIframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-forms');
            adContainer.appendChild(adIframe);
            
            const iframeDoc = adIframe.contentDocument || adIframe.contentWindow.document;
            iframeDoc.open();
            iframeDoc.write(`
                <html style="margin:0; padding:0; background:#000; overflow:hidden; width:100%; height:100%;">
                <body style="margin:0; padding:0; display:flex; justify-content:center; align-items:center; width:100%; height:100%;">
                    <script>
                        (function(s){
                            s.dataset.zone='11297762';
                            s.src='https://nap5k.com/tag.min.js';
                        })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
                    <\/script>
                </body>
                </html>
            `);
            iframeDoc.close();
        }

        function injectUniversalMediaFrame(targetUrl) {
            let videoId = "";
            if (targetUrl.includes("shorts/")) videoId = targetUrl.split("shorts/")[1]?.split(/[?#]/)[0];
            else if (targetUrl.includes("youtu.be/")) videoId = targetUrl.split("youtu.be/")[1]?.split(/[?#]/)[0];
            else if (targetUrl.includes("v=")) videoId = targetUrl.split("v=")[1]?.split(/[&#]/)[0];
            else if (targetUrl.includes("embed/")) videoId = targetUrl.split("embed/")[1]?.split(/[?#]/)[0];

            if (videoId && videoId.length === 11) {
                youtubePlayerContainer.innerHTML = `
                    <iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1&controls=1&rel=0&modestbranding=1" 
                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" allowfullscreen>
                    </iframe>`;
            } else {
                youtubePlayerContainer.innerHTML = `<div style="color:white; padding:40px; text-align:center;">Error: Link structural failure.</div>`;
            }
        }

        closeOverlayBtn.onclick = () => {
            window.onbeforeunload = null;
            window.location.replace("task.html");
        };
    </script>
</body>
</html>
