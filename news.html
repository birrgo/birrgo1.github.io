<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BirrGo - Premium Updates Center</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-burgundy: #800020;
            --primary-gradient: linear-gradient(135deg, #9b0026 0%, #4a0000 100%);
            --accent-glow: rgba(128, 0, 32, 0.08);
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-light: #e2e8f0;
            --card-shadow: 0 12px 30px -6px rgba(15, 23, 42, 0.04), 0 4px 12px -3px rgba(15, 23, 42, 0.02);
            --border-radius-lg: 24px;
            --border-radius-md: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.2px;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100dvh;
            overflow: hidden;
            background-color: #f1f5f9;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .app-view {
            width: 100%;
            height: 100dvh;
            max-width: 450px;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .nav-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: calc(16px + env(safe-area-inset-top)) 20px 14px 20px;
            border-bottom: 1px solid var(--border-light);
            background: #ffffff;
            z-index: 100;
        }

        .back-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--bg-light);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-dark);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .back-action-btn:active {
            transform: scale(0.92);
            background: var(--border-light);
        }

        .back-action-btn svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
        }

        .header-title-text {
            font-size: 17px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .header-spacer {
            width: 40px;
        }

        .app-content {
            flex: 1;
            overflow-y: auto;
            background-color: var(--bg-light);
            padding: 16px 20px 40px 20px;
            scrollbar-width: none;
        }
        .app-content::-webkit-scrollbar { display: none; }

        .category-filter-row {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            overflow-x: auto;
            scrollbar-width: none;
            padding: 4px 0;
        }
        .category-filter-row::-webkit-scrollbar { display: none; }

        .filter-pill {
            padding: 10px 18px;
            border-radius: 24px;
            font-size: 13.5px;
            font-weight: 700;
            color: var(--text-muted);
            background: #ffffff;
            border: 1px solid var(--border-light);
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .filter-pill.active-pill {
            background: var(--primary-burgundy);
            color: #ffffff;
            border-color: var(--primary-burgundy);
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .broadcasts-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 20px;
        }

        .featured-broadcast-card {
            background: #ffffff;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-lg);
            padding: 22px;
            box-shadow: var(--card-shadow);
            position: relative;
            overflow: hidden;
        }

        .featured-broadcast-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background: var(--primary-gradient);
        }

        .badge-meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .spotlight-pill {
            background: rgba(128, 0, 32, 0.08);
            color: var(--primary-burgundy);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }
        
        .spotlight-pill.system-badge {
            background: rgba(30, 41, 59, 0.08);
            color: #1e293b;
        }

        .timestamp-log-text {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-muted);
        }

        .broadcast-image-frame {
            width: 100%;
            max-height: 180px;
            border-radius: var(--border-radius-md);
            overflow: hidden;
            margin-bottom: 14px;
            border: 1px solid var(--border-light);
        }

        .broadcast-image-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .broadcast-title {
            font-size: 20px;
            font-weight: 800;
            color: var(--text-dark);
            line-height: 1.35;
            margin-bottom: 12px;
            letter-spacing: -0.4px;
        }

        .broadcast-body-text {
            font-size: 14px;
            font-weight: 500;
            color: #334155;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .promo-redeem-card {
            display: none;
            background: #ffffff;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-lg);
            padding: 20px;
            box-shadow: var(--card-shadow);
            margin-bottom: 24px;
        }

        .promo-header-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .promo-gift-badge {
            font-size: 20px;
        }

        .promo-header-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--text-dark);
        }

        .promo-header-subtitle {
            font-size: 11px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .promo-action-fields {
            display: flex;
            gap: 8px;
        }

        .promo-input-field {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid var(--border-light);
            border-radius: var(--border-radius-md);
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dark);
            background-color: var(--bg-light);
            outline: none;
            letter-spacing: 0.5px;
            transition: all 0.2s ease;
        }

        .promo-input-field:focus {
            border-color: var(--primary-burgundy);
            background-color: #ffffff;
            box-shadow: 0 0 0 3px rgba(128, 0, 32, 0.06);
        }

        .promo-submit-btn {
            padding: 0 20px;
            background: var(--primary-gradient);
            color: #ffffff;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--accent-glow);
            transition: opacity 0.2s;
            white-space: nowrap;
        }

        .promo-submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* PREMIUM CUSTOM MODAL POPUP SYSTEM STYLE */
        .custom-popup-overlay {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .custom-popup-modal {
            width: 100%;
            max-width: 340px;
            background: #ffffff;
            border-radius: 24px;
            padding: 28px 24px;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transform: scale(0.9);
            transition: transform 0.2s ease;
        }

        .custom-popup-overlay.show-popup {
            display: flex;
        }
        .custom-popup-overlay.show-popup .custom-popup-modal {
            transform: scale(1);
        }

        .popup-status-icon {
            font-size: 44px;
            margin-bottom: 16px;
            display: inline-block;
        }

        /* Large Bold Green Amount Styling */
        .popup-success-amount {
            font-size: 36px;
            font-weight: 800;
            color: #22c55e;
            margin-bottom: 16px;
            display: block;
            letter-spacing: -1px;
        }

        .popup-main-title {
            font-size: 18px;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .popup-body-desc {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .popup-dismiss-action {
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: #ffffff;
            border: none;
            border-radius: var(--border-radius-md);
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 12px var(--accent-glow);
        }

        .popup-dismiss-action:active {
            opacity: 0.9;
        }

        .verified-footer-shield {
            text-align: center;
            padding: 32px 0 12px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .footer-shield-text {
            font-size: 10px;
            font-weight: 700;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }
    </style>
</head>
<body>

    <div class="app-view">
        <!-- CUSTOM MODAL COMPONENT CONTAINER -->
        <div class="custom-popup-overlay" id="customPopupModule">
            <div class="custom-popup-modal">
                <span class="popup-status-icon" id="popupIconNode">🎁</span>
                <!-- Added a dynamic element holder for green amount strings -->
                <span id="popupAmountNode" style="display: none;"></span>
                <h3 class="popup-main-title" id="popupTitleNode">Status Alert</h3>
                <p class="popup-body-desc" id="popupDescNode">Notification update context.</p>
                <button class="popup-dismiss-action" id="closePopupBtn">Continue</button>
            </div>
        </div>

        <header class="nav-header">
            <a href="dashboard.html" class="back-action-btn" aria-label="Navigate Back">
                <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </a>
            <h1 class="header-title-text">Updates Center</h1>
            <div class="header-spacer"></div>
        </header>

        <main class="app-content">
            <div class="category-filter-row" id="filterPillsRow">
                <span class="filter-pill active-pill" data-category="All Updates">All Updates</span>
                <span class="filter-pill" data-category="System Releases">System Releases</span>
                <span class="filter-pill" data-category="Promo Rewards">Promo Rewards</span>
            </div>

            <section class="promo-redeem-card" id="promoRedeemSection">
                <div class="promo-header-group">
                    <span class="promo-gift-badge">🎁</span>
                    <div>
                        <h3 class="promo-header-title">Claim Reward Voucher</h3>
                        <p class="promo-header-subtitle">Enter your official limit promo code for instant bonus</p>
                    </div>
                </div>
                <div class="promo-action-fields">
                    <input type="text" class="promo-input-field" id="promoCodeInput" placeholder="ENTER PROMO CODE" maxlength="20" autocomplete="off">
                    <button class="promo-submit-btn" id="claimPromoBtn">Claim</button>
                </div>
            </section>

            <div class="broadcasts-container" id="broadcastsContainer">
                <div class="featured-broadcast-card">
                    <h2 class="broadcast-title" style="font-size:16px; text-align:center;">Connecting to Server Node...</h2>
                </div>
            </div>

            <footer class="verified-footer-shield">
                <span class="footer-shield-text">Secure Matrix Verified</span>
            </footer>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, get, set, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCRHoIZf1ZPR9m3YYTv-I9CfwyGqsSOMWo",
            authDomain: "birrgo-fdf7e.firebaseapp.com",
            databaseURL: "https://birrgo-fdf7e-default-rtdb.firebaseio.com",
            projectId: "birrgo-fdf7e",
            storageBucket: "birrgo-fdf7e.firebasestorage.app",
            messagingSenderId: "2317445154",
            appId: "1:2317445154:web:4275cbb0f46b28f64f827b",
            measurementId: "G-24X13TZ43D"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        let activeUserPhone = "912345678"; 
        let localCachedBroadcasts = [];
        let currentActiveCategoryFilter = "All Updates";

        document.addEventListener('DOMContentLoaded', () => {
            const activeUserPhoneSession = localStorage.getItem('auth_session_phone');
            if (!activeUserPhoneSession) {
                window.location.href = "login.html";
                return;
            }
            activeUserPhone = activeUserPhoneSession;

            streamLiveAdminUpdatesLog();
            bindVisualInterfaceControls();
            
            const claimBtn = document.getElementById('claimPromoBtn');
            if (claimBtn) {
                claimBtn.addEventListener('click', processPromoClaim);
            }

            const closeBtn = document.getElementById('closePopupBtn');
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    document.getElementById('customPopupModule').classList.remove('show-popup');
                });
            }
        });

        function streamLiveAdminUpdatesLog() {
            const adminNewsRef = ref(db, `adminNews`);
            
            onValue(adminNewsRef, (snapshot) => {
                localCachedBroadcasts = [];

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    Object.keys(data).forEach(key => {
                        localCachedBroadcasts.push({ id: key, ...data[key] });
                    });

                    localCachedBroadcasts.sort((a, b) => (b.createdAtTimestamp || 0) - (a.createdAtTimestamp || 0));
                    renderFilteredBroadcasts();
                } else {
                    renderEmptyState();
                }
            }, (error) => {
                console.error("Database Core Error:", error);
                const container = document.getElementById('broadcastsContainer');
                if(container) container.innerHTML = '<p style="text-align:center;color:red;font-size:12px;">Synchronization Halted</p>';
            });
        }

        function renderEmptyState() {
            const container = document.getElementById('broadcastsContainer');
            if (!container) return;
            
            if (currentActiveCategoryFilter === "Promo Rewards") {
                container.innerHTML = `
                    <div style="text-align:center; padding:20px; color:var(--text-muted); font-size:13px; font-weight:600;">
                        Use the form module above to verify live codes.
                    </div>
                `;
            } else {
                container.innerHTML = `
                    <article class="featured-broadcast-card">
                        <div class="badge-meta-row"><span class="spotlight-pill">System OK</span></div>
                        <h2 class="broadcast-title">All Systems Nominal</h2>
                        <p class="broadcast-body-text">There are no updates or notices posted under this filter category today.</p>
                    </article>
                `;
            }
        }

        function renderFilteredBroadcasts() {
            const container = document.getElementById('broadcastsContainer');
            if (!container) return;
            
            container.innerHTML = "";

            const promoBox = document.getElementById('promoRedeemSection');
            if (promoBox) {
                if (currentActiveCategoryFilter === "Promo Rewards") {
                    promoBox.style.display = "block";
                } else {
                    promoBox.style.display = "none";
                }
            }

            const filtered = localCachedBroadcasts.filter(item => {
                const nodeCategory = (item.category || "All Updates").trim();
                if (currentActiveCategoryFilter === "All Updates") {
                    return nodeCategory.toLowerCase() !== "system releases";
                }
                return nodeCategory.toLowerCase() === currentActiveCategoryFilter.trim().toLowerCase();
            });

            if (filtered.length === 0) {
                renderEmptyState();
                return;
            }

            filtered.forEach(item => {
                const headline = item.title || "Platform Announcement";
                const content = item.content || item.message || "";
                const category = item.category || "All Updates";
                const imageUrl = item.imageUrl || "";
                const displayDate = item.date || "Recent";

                const isSystem = category.trim().toLowerCase() === "system releases";
                const pillBadgeClass = isSystem ? "spotlight-pill system-badge" : "spotlight-pill";

                const card = document.createElement('article');
                card.className = "featured-broadcast-card";
                
                let imageHTML = "";
                if (imageUrl && imageUrl.trim().length > 0) {
                    imageHTML = `
                        <div class="broadcast-image-frame">
                            <img src="${imageUrl}" alt="Broadcast Media">
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="badge-meta-row">
                        <span class="${pillBadgeClass}">${isSystem ? 'System Upgrade' : 'Announcement'}</span>
                        <span class="timestamp-log-text">${displayDate}</span>
                    </div>
                    ${imageHTML}
                    <h2 class="broadcast-title">${headline}</h2>
                    <p class="broadcast-body-text">${content}</p>
                `;
                container.appendChild(card);
            });
        }

        function bindVisualInterfaceControls() {
            const pills = document.querySelectorAll('.filter-pill');
            pills.forEach(pill => {
                pill.addEventListener('click', function() {
                    pills.forEach(p => p.classList.remove('active-pill'));
                    this.classList.add('active-pill');
                    
                    currentActiveCategoryFilter = this.getAttribute('data-category') || this.innerText.trim();
                    renderFilteredBroadcasts();
                });
            });
        }

        async function processPromoClaim() {
            const inputField = document.getElementById('promoCodeInput');
            const claimBtn = document.getElementById('claimPromoBtn');
            
            if (!inputField || !claimBtn) return;

            const enteredCode = inputField.value.trim().toUpperCase();

            if (!enteredCode) {
                triggerUiPopup("⚠️", "Input Empty", "Please enter a valid code voucher string to process.");
                return;
            }

            claimBtn.disabled = true;
            claimBtn.innerText = "Checking...";

            try {
                const campaignRef = ref(db, 'globalPromoCampaign');
                const campaignSnap = await get(campaignRef);

                if (!campaignSnap.exists()) {
                    triggerUiPopup("❌", "No Active Promo", "There are no ongoing promotional rewards events active at this time.");
                    return;
                }

                const campaignData = campaignSnap.val();

                // 1. WRONG CODE MODAL POPUP TRIGGER
                if (enteredCode !== String(campaignData.code).trim().toUpperCase()) {
                    triggerUiPopup("❌", "Wrong Promo Code", "The code you entered is invalid. Please try again with a correct code.");
                    return;
                }

                // 2. EXPIRED / EXHAUSTED MODAL POPUP TRIGGER
                const currentCount = parseInt(campaignData.currentClaimCount) || 0;
                const maxClaims = parseInt(campaignData.maxClaims) || 0;
                if (currentCount >= maxClaims) {
                    triggerUiPopup("🚫", "Promo Expired", "This promotional campaign has expired! Limit cap allocations are complete.");
                    return;
                }

                // 3. ALREADY CLAIMED MODAL POPUP TRIGGER
                const userHistoryRef = ref(db, `users/${activeUserPhone}/claimedPromos/${enteredCode}`);
                const historySnap = await get(userHistoryRef);
                if (historySnap.exists()) {
                    triggerUiPopup("⚠️", "Already Claimed", "You have already collected this voucher bonus value to your account balance.");
                    return;
                }

                // Transaction limit verification step
                const counterRef = ref(db, 'globalPromoCampaign/currentClaimCount');
                const transactionResult = await runTransaction(counterRef, (currentValue) => {
                    let val = parseInt(currentValue);
                    if (currentValue === null || isNaN(val)) val = 0;
                    if (val >= maxClaims) return; 
                    return val + 1;
                });

                if (!transactionResult.committed) {
                    triggerUiPopup("🚫", "Promo Expired", "This promotional campaign has expired! Limit cap allocations are complete.");
                    return;
                }

                // 4. CONGRATULATIONS AND BALANCES ALLOCATED TO WALLET
                const balanceRef = ref(db, `users/${activeUserPhone}/walletBalance`);
                const currentBalanceSnap = await get(balanceRef);
                
                let reward = parseFloat(campaignData.rewardAmount) || 0;
                let currentBalance = 0;
                
                if (currentBalanceSnap.exists() && currentBalanceSnap.val() !== null) {
                    currentBalance = parseFloat(currentBalanceSnap.val()) || 0;
                }
                
                let newCalculatedBalance = currentBalance + reward;
                
                // Write balanced calculation data
                await set(balanceRef, newCalculatedBalance);
                
                // Save required claimedAt and amountClaimed under claimedPromos node
                await set(userHistoryRef, { 
                    claimedAt: Date.now(),
                    amountClaimed: reward 
                });

                // SUCCESS - TRIGGER GREEN AMOUNT POPUP & REMOVE REWARD ICON
                triggerUiPopup("", "Voucher Redeemed!", "Successfully updated onto your wallet balance.", `+${reward} Birr`);
                inputField.value = "";

            } catch (error) {
                console.error("Voucher operation pipeline fail:", error);
                triggerUiPopup("❌", "Network Error", "Secure server connection failure. Please try again.");
            } finally {
                claimBtn.disabled = false;
                claimBtn.innerText = "Claim";
            }
        }

        function triggerUiPopup(icon, title, desc, greenAmount = "") {
            const overlay = document.getElementById('customPopupModule');
            const iconNode = document.getElementById('popupIconNode');
            const amountNode = document.getElementById('popupAmountNode');
            const titleNode = document.getElementById('popupTitleNode');
            const descNode = document.getElementById('popupDescNode');
            
            if (overlay && iconNode && titleNode && descNode && amountNode) {
                // If a green amount is provided, hide the icon and display green amount
                if (greenAmount) {
                    iconNode.style.display = "none";
                    amountNode.innerText = greenAmount;
                    amountNode.className = "popup-success-amount";
                    amountNode.style.display = "block";
                } else {
                    // Fallback to normal icon behaviour for warnings/errors
                    iconNode.innerText = icon;
                    iconNode.style.display = "inline-block";
                    amountNode.style.display = "none";
                }

                titleNode.innerText = title;
                descNode.innerText = desc;
                overlay.classList.add('show-popup');
            }
        }
    </script>
</body>
</html>
